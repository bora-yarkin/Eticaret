name: Feature request
description: Suggest an improvement or new capability for Eticaret.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea for Eticaret.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: What feature would you like to see?
      placeholder: Add a paginated admin order list with filtering.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What pain point or limitation does this address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workarounds or alternative approaches you considered.

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add screenshots, references, or related issues if useful.
